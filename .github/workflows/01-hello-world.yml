name: 01 - Hello World

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello, GitHub Actions!"
      - run: |
          echo "Event:  ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Actor:  ${{ github.actor }}"
          echo "SHA:    ${{ github.sha }}"
