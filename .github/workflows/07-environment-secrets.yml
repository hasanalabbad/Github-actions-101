# 07 — Environments & Secrets
# Use GitHub Environments for staged deployments with protection rules and secrets.

name: 07 - Deploy with Environments

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-staging:
        description: 'Skip staging and deploy directly to production'
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "All tests passed."

  deploy-staging:
    needs: test
    if: ${{ !inputs.skip-staging }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying to STAGING..."
          echo "Using secret: ${{ secrets.DEPLOY_KEY != '' && '***' || '(not set)' }}"
          echo "Deployment target: staging.example.com"

  deploy-production:
    needs: [test, deploy-staging]
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com

    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploying to PRODUCTION..."
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
