# 02 — CI Pipeline
# A realistic CI workflow: checkout, install, lint, test, upload artifacts.

name: 02 - CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: src

      - name: Run linter
        run: npm run lint --if-present
        working-directory: src

      - name: Run tests
        run: npm test --if-present
        working-directory: src

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/test-results/
          retention-days: 7
